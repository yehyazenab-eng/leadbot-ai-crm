<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Veyro Systems</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #070a12;
        --panel: rgba(255, 255, 255, 0.06);
        --border: rgba(255, 255, 255, 0.14);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.70);
        --accent: #7c3aed;
        --accent-strong: #8b5cf6;
        --success: #22c55e;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        background:
          radial-gradient(1200px 700px at 10% 10%, rgba(124, 58, 237, 0.26), transparent 45%),
          radial-gradient(900px 520px at 90% 10%, rgba(34, 197, 94, 0.16), transparent 40%),
          linear-gradient(180deg, #050711, var(--bg));
        color: var(--text);
        padding: 24px;
      }

      .card {
        width: 100%;
        max-width: 560px;
        border: 1px solid var(--border);
        border-radius: 20px;
        background: var(--panel);
        backdrop-filter: blur(12px);
        padding: 20px;
        box-shadow: 0 22px 70px rgba(0, 0, 0, 0.34);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border: 1px solid rgba(255, 255, 255, 0.10);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 14px;
      }

      h1 {
        margin: 0 0 6px 0;
        font-size: 24px;
        letter-spacing: 0.2px;
      }

      p {
        margin: 0 0 16px 0;
        color: var(--muted);
        line-height: 1.45;
      }

      label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin: 12px 0 6px;
      }

      input,
      textarea,
      select {
        width: 100%;
        box-sizing: border-box;
        padding: 12px 12px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(0, 0, 0, 0.22);
        color: var(--text);
        outline: none;
      }

      select {
        cursor: pointer;
      }

      textarea {
        resize: vertical;
        min-height: 110px;
      }

      input:focus,
      textarea:focus,
      select:focus {
        border-color: rgba(124, 58, 237, 0.65);
        box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.18);
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      @media (max-width: 560px) {
        .row {
          grid-template-columns: 1fr;
        }
      }

      .actions {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-top: 14px;
        flex-wrap: wrap;
      }

      button {
        border-radius: 12px;
        border: 1px solid rgba(124, 58, 237, 0.6);
        background: rgba(124, 58, 237, 0.28);
        color: var(--text);
        padding: 11px 16px;
        font-weight: 700;
        cursor: pointer;
        min-width: 120px;
        transition: 0.18s ease;
      }

      button:hover {
        background: rgba(124, 58, 237, 0.38);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.72;
        background: rgba(34, 197, 94, 0.18);
        border-color: rgba(34, 197, 94, 0.45);
      }

      .hint {
        color: var(--muted);
        font-size: 12px;
      }

      .status {
        display: none;
        margin-top: 12px;
        padding: 10px 12px;
        border: 1px solid rgba(34, 197, 94, 0.22);
        border-radius: 12px;
        background: rgba(34, 197, 94, 0.08);
        color: rgba(220, 255, 230, 0.92);
        font-size: 13px;
      }

      .status.show {
        display: block;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div class="brand">Veyro Systems • AI Business Automation</div>

      <h1>Leave your details</h1>
      <p>We’ll get back to you shortly.</p>

      <form id="leadForm" method="post" action="/lead">
        <div class="row">
          <div>
            <label for="name">Name</label>
            <input id="name" name="name" type="text" placeholder="Your name" autocomplete="name" />
          </div>

          <div>
            <label for="phone">Phone</label>
            <input
              id="phone"
              name="phone"
              type="text"
              placeholder="050-123-4567"
              autocomplete="tel"
              required
            />
          </div>
        </div>

        <label for="request">What do you need?</label>
        <textarea id="request" name="request" placeholder="Tell us what you’re looking for..." required></textarea>

        <label for="source">Where did you hear about us?</label>
        <select id="source" name="source">
          <option value="instagram">Instagram</option>
          <option value="tiktok">TikTok</option>
          <option value="facebook">Facebook</option>
          <option value="google">Google</option>
          <option value="website">Website</option>
          <option value="friend">Friend</option>
          <option value="other">Other</option>
        </select>

        <div class="actions">
          <button id="submitButton" type="submit">Submit</button>
          <span id="submitHint" class="hint">Your request will be sent securely.</span>
        </div>

        <div id="submitStatus" class="status">
          Sending your request. Please wait a moment...
        </div>
      </form>
    </div>

    <script>
      const form = document.getElementById("leadForm");
      const submitButton = document.getElementById("submitButton");
      const submitHint = document.getElementById("submitHint");
      const submitStatus = document.getElementById("submitStatus");

      let isSubmitting = false;

      form.addEventListener("submit", function (event) {
        if (isSubmitting) {
          event.preventDefault();
          return;
        }

        if (!form.checkValidity()) {
          return;
        }

        isSubmitting = true;

        submitButton.disabled = true;
        submitButton.innerText = "Sending...";
        submitHint.innerText = "Please do not refresh or submit again.";
        submitStatus.classList.add("show");

        const fields = form.querySelectorAll("input, textarea, select");
        fields.forEach((field) => {
          field.readOnly = true;
          if (field.tagName.toLowerCase() === "select") {
            field.style.pointerEvents = "none";
          }
        });
      });
    </script>
  </body>
</html>
