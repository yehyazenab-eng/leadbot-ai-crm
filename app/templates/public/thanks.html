<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Thank you</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #070a12;
        --panel: rgba(255, 255, 255, 0.06);
        --border: rgba(255, 255, 255, 0.14);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.70);
        --accent: #7c3aed;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        background: radial-gradient(1200px 700px at 10% 10%, rgba(124, 58, 237, 0.26), transparent 45%),
          linear-gradient(180deg, #050711, var(--bg));
        color: var(--text);
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 560px;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: var(--panel);
        backdrop-filter: blur(12px);
        padding: 18px;
      }
      h1 {
        margin: 0 0 6px 0;
        font-size: 22px;
      }
      p {
        margin: 0 0 14px 0;
        color: var(--muted);
        line-height: 1.4;
      }
      a {
        color: rgba(220, 200, 255, 0.95);
        text-decoration: none;
      }
      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 10px;
      }
      .btn {
        display: inline-block;
        border-radius: 12px;
        border: 1px solid rgba(124, 58, 237, 0.6);
        background: rgba(124, 58, 237, 0.24);
        color: var(--text);
        padding: 10px 14px;
        font-weight: 650;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Thanks — we got it.</h1>
      <p>We’ll contact you soon.{% if lead_id %} Reference: <strong>#{{ lead_id }}</strong>.{% endif %}</p>
      <div class="actions">
        <a class="btn" href="/lead">Submit another</a>
        <a class="btn" href="/crm/leads">Open CRM</a>
      </div>
    </div>
  </body>
</html>
